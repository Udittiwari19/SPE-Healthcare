---
# MySQL Role — Deploy MySQL to Kubernetes

- name: Render MySQL deployment manifest
  ansible.builtin.template:
    src: mysql-deployment.yaml.j2
    dest: "{{ project_dir }}/k8s/mysql-deployment.yaml"
    mode: '0644'

- name: Apply MySQL Deployment
  ansible.builtin.command:
    cmd: "kubectl apply -f k8s/mysql-deployment.yaml --kubeconfig={{ kubeconfig_path }}"
    chdir: "{{ project_dir }}"
  changed_when: true

- name: Wait for MySQL pod to be ready
  ansible.builtin.command:
    cmd: "kubectl wait --for=condition=ready pod -l app=mysql --timeout=120s --kubeconfig={{ kubeconfig_path }}"
    chdir: "{{ project_dir }}"
  changed_when: false
  ignore_errors: true
