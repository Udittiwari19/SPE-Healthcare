---
# HPA Role — Deploy Horizontal Pod Autoscalers to Kubernetes

- name: Apply HPA manifests
  ansible.builtin.command:
    cmd: "kubectl apply -f k8s/hpa.yaml --kubeconfig={{ kubeconfig_path }}"
    chdir: "{{ project_dir }}"
  changed_when: true

- name: Verify HPA status
  ansible.builtin.command:
    cmd: "kubectl get hpa --kubeconfig={{ kubeconfig_path }}"
    chdir: "{{ project_dir }}"
  register: hpa_output
  changed_when: false

- name: Display HPA status
  ansible.builtin.debug:
    var: hpa_output.stdout_lines
