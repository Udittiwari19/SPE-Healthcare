---
# Main Playbook — Deploy Healthcare App to Kubernetes
# Uses Ansible Roles for modular deployment and Vault for secret management
#
# Usage:
#   ansible-playbook deploy-k8s.yml -i inventory --vault-password-file .vault_pass

- name: Deploy Healthcare App to Kubernetes
  hosts: local
  gather_facts: false
  roles:
    - role: mysql
      tags: [mysql, database]
    - role: backend
      tags: [backend, app]
    - role: frontend
      tags: [frontend, app]
    - role: hpa
      tags: [hpa, scaling]
